version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: support_pilot_postgres
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: support_pilot_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - support_network

volumes:
  postgres_data:

networks:
  support_network:
