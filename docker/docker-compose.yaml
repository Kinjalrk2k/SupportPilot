version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: support_pilot_postgres
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: support_pilot_db
      DATABASE_URL: postgresql://user:password@localhost:5432/support_pilot_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - support_pilot_network

  chromadb:
    image: chromadb/chroma:latest
    container_name: support_pilot_chromadb
    ports:
      - "8000:8000"
    volumes:
      - ./chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE

  redis:
    image: redis:alpine
    container_name: support_pilot_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      # This ensures your chat history survives if you restart the Docker container
      - ./redis_data:/data
    # appendonly ensures every write is saved to disk immediately
    command: redis-server --appendonly yes

  kafka:
    image: apache/kafka:latest
    container_name: support_pilot_kafka_broker
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      # 1. Enable KRaft mode (No Zookeeper)
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=controller,broker
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093

      # 2. Network Listeners
      - KAFKA_LISTENERS=INTERNAL://:29092,EXTERNAL://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=INTERNAL://kafka:29092,EXTERNAL://localhost:9092,CONTROLLER://kafka:9093
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_INTER_BROKER_LISTENER_NAME=INTERNAL

      # 3. Auto-create topics when the Python producer sends the first message
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
    volumes:
      - ./kafka_data:/bitnami/kafka

  # Optional but highly recommended: A visual dashboard for your topics
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: support_pilot_kafka_ui
    restart: unless-stopped
    ports:
      - "8081:8080" # Exposed on 8081 so it doesn't conflict with your FastAPI server!
    environment:
      - KAFKA_CLUSTERS_0_NAME=SupportPilot-Local
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:29092
    depends_on:
      - kafka

volumes:
  postgres_data:

networks:
  support_pilot_network:
